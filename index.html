<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo Viércoles</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">⚽ Torneo Viércoles</div>

<h1>Torneo Apertura 2026</h1>
<h2>Julio "Messi" Gimenez</h2>

<button onclick="abrirLogin()">Modo admin</button>
<button onclick="logout()">Salir admin</button>

<!-- MODAL LOGIN -->
<div id="modalLogin" class="modal">
  <div class="modal-content">
    <h3>Ingreso admin</h3>
    <input type="password" id="passwordInput" placeholder="Contraseña">
    <button onclick="verificarLogin()">Ingresar</button>
  </div>
</div>

<!-- JUGADOR DE LA FECHA -->
<div class="card">
  <h2>🏅 Jugador de la Fecha</h2>
  <div id="infoFecha"></div>

  <div id="adminJugador" style="display:none;">
    <input type="text" id="inputJugador" placeholder="Nombre del jugador">
    <button onclick="guardarJugador()">Guardar</button>
  </div>
</div>

<div class="card">
  <h2>Tabla de posiciones</h2>
  <p id="tabla"></p>
</div>

<div class="card">
  <h2>Partidos</h2>
  <table id="partidos"></table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAY-F10jVa_KTRtIjm4GNupFQ_UR1TsJVw",
  authDomain: "torneo-viercoles.firebaseapp.com",
  projectId: "torneo-viercoles",
  storageBucket: "torneo-viercoles.firebasestorage.app",
  messagingSenderId: "233402812946",
  appId: "1:233402812946:web:f1b9acd1f95f243200e6cb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const equipoA = "Equipo SEBA";
const equipoB = "Equipo HEBER";

let admin = localStorage.getItem("admin") === "true";
let datos = [];
let jugadorFecha = "";

// LOGIN
window.abrirLogin = () => {
  document.getElementById("modalLogin").style.display = "flex";
};

window.verificarLogin = () => {
  let pass = document.getElementById("passwordInput").value;

  if (pass === "cogi2") {
    admin = true;
    localStorage.setItem("admin", "true");
    document.getElementById("modalLogin").style.display = "none";
    renderAll();
  } else {
    alert("Contraseña incorrecta");
  }
};

window.logout = () => {
  admin = false;
  localStorage.removeItem("admin");
  renderAll();
};

// FECHAS
function generarFechas() {
  let fechas = [];
  let inicio = new Date("2026-04-01");
  let fin = new Date("2026-07-29");

  let actual = new Date(inicio);

  while (actual <= fin) {
    if (actual.getDay() === 3) {
      fechas.push(new Date(actual));
    }
    actual.setDate(actual.getDate() + 1);
  }

  return fechas;
}

// FIREBASE
function cargarDatos() {
  const ref = doc(db, "torneo", "datos");

  onSnapshot(ref, (docSnap) => {
    if (docSnap.exists()) {
      datos = docSnap.data().partidos;
      jugadorFecha = docSnap.data().jugador || "";
    } else {
      datos = generarFechas().map(f => ({
        fecha: f.toLocaleDateString('es-AR', {
          day: '2-digit',
          month: '2-digit'
        }),
        resultado: null
      }));
      guardar();
    }

    renderAll();
  });
}

function guardar() {
  const ref = doc(db, "torneo", "datos");
  setDoc(ref, {
    partidos: datos,
    jugador: jugadorFecha
  });
}

// RENDER GENERAL
function renderAll() {
  renderPartidos();
  renderTabla();
  renderJugador();
}

// TABLA PARTIDOS
function renderPartidos() {
  const tabla = document.getElementById("partidos");

  tabla.innerHTML = `
    <tr>
      <th>Fecha</th>
      <th>Día / Mes</th>
      <th>Resultado</th>
      <th>Cargar</th>
    </tr>
  `;

  datos.forEach((p, i) => {
    let fila = document.createElement("tr");

    fila.innerHTML = `
      <td>Fecha ${i + 1}</td>
      <td>${p.fecha}</td>
      <td class="${
        p.resultado === "Empate"
          ? "empate"
          : p.resultado?.includes(equipoA) || p.resultado?.includes(equipoB)
          ? "ganado"
          : ""
      }">
        ${p.resultado ?? "-"}
      </td>
      <td>
        ${admin ? `
          <input type="number" placeholder="+goles" id="goles${i}">
          <select id="ganador${i}">
            <option value="">-</option>
            <option value="A">${equipoA}</option>
            <option value="B">${equipoB}</option>
            <option value="E">Empate</option>
          </select>
          <button onclick="guardarResultado(${i})">OK</button>
        ` : 'Solo lectura'}
      </td>
    `;

    tabla.appendChild(fila);
  });
}

// GUARDAR RESULTADO
window.guardarResultado = (i) => {
  let goles = document.getElementById("goles" + i).value;
  let ganador = document.getElementById("ganador" + i).value;

  if (!ganador) return alert("Elegí un resultado");

  if (ganador === "E") {
    datos[i].resultado = "Empate";
  } else {
    datos[i].resultado = `${ganador === "A" ? equipoA : equipoB} +${goles}`;
  }

  guardar();
};

// TABLA POSICIONES
function renderTabla() {
  let puntosA = 0;
  let puntosB = 0;

  datos.forEach(p => {
    if (!p.resultado) return;

    if (p.resultado === "Empate") {
      puntosA += 1;
      puntosB += 1;
    } else if (p.resultado.includes(equipoA)) {
      puntosA += 3;
    } else {
      puntosB += 3;
    }
  });

  let jugados = datos.filter(p => p.resultado).length;

  let tabla = [
    { nombre: equipoA, puntos: puntosA },
    { nombre: equipoB, puntos: puntosB }
  ].sort((a, b) => b.puntos - a.puntos);

  document.getElementById("tabla").innerHTML = `
    <div style="margin-bottom:10px; color:#9ca3af;">
      Partidos jugados: ${jugados}
    </div>
    ${tabla.map((e, i) => `
      <div class="fila ${i === 0 ? 'lider' : ''}">
        ${i === 0 ? '🥇' : ''} <b>${e.nombre}</b> -
        ${e.puntos} pts
      </div>
    `).join("")}
  `;
}

// JUGADOR
function renderJugador() {
  let jugados = datos.filter(p => p.resultado).length;

  document.getElementById("infoFecha").innerHTML = `
    <div>Fecha actual: ${jugados}</div>
    <div>Jugador de la fecha: <b>${jugadorFecha || "-"}</b></div>
  `;

  document.getElementById("adminJugador").style.display = admin ? "block" : "none";
}

window.guardarJugador = () => {
  jugadorFecha = document.getElementById("inputJugador").value;
  guardar();
};

// INIT
cargarDatos();

</script>

</body>
</html>
