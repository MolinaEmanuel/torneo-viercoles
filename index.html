<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo Miércoles</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">⚽ Torneo Miércoles</div>

<h1>Torneo Miércoles</h1>
<h2>Apertura 2026</h2>

<button onclick="abrirLogin()">Modo admin</button>
<button onclick="logout()">Salir admin</button>

<!-- MODAL LOGIN -->
<div id="modalLogin" class="modal">
  <div class="modal-content">
    <h3>Ingreso admin</h3>
    <input type="password" id="passwordInput" placeholder="Contraseña">
    <button onclick="verificarLogin()">Ingresar</button>
  </div>
</div>

<div class="card">
  <h2>Tabla de posiciones</h2>
  <p id="tabla"></p>
</div>

<div class="card">
  <h2>Partidos</h2>
  <table id="partidos"></table>
</div>

<!-- FIREBASE + APP -->
<script type="module">

// 🔥 IMPORTS FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 CONFIG (PEGÁ LA TUYA)
const firebaseConfig = {
  apiKey: "AIzaSyAY-F10jVa_KTRtIjm4GNupFQ_UR1TsJVw",
  authDomain: "torneo-viercoles.firebaseapp.com",
  projectId: "torneo-viercoles",
  storageBucket: "torneo-viercoles.firebasestorage.app",
  messagingSenderId: "233402812946",
  appId: "1:233402812946:web:f1b9acd1f95f243200e6cb"
};

// 🔥 INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// DATOS
const equipoA = "Equipo SEBA";
const equipoB = "Equipo HEBER";

let admin = localStorage.getItem("admin") === "true";
let datos = [];

// LOGIN
window.abrirLogin = function() {
  document.getElementById("modalLogin").style.display = "flex";
}

window.verificarLogin = function() {
  let pass = document.getElementById("passwordInput").value;

  if (pass === "cogi2") {
    admin = true;
    localStorage.setItem("admin", "true");
    cerrarLogin();
    renderPartidos();
  } else {
    alert("Contraseña incorrecta");
  }
}

function cerrarLogin() {
  document.getElementById("modalLogin").style.display = "none";
}

window.logout = function() {
  admin = false;
  localStorage.removeItem("admin");
  renderPartidos();
}

// FECHAS
function generarFechas() {
  let fechas = [];
  let inicio = new Date("2026-04-01");
  let fin = new Date("2026-07-29");

  let actual = new Date(inicio);

  while (actual <= fin) {
    if (actual.getDay() === 3) {
      fechas.push(new Date(actual));
    }
    actual.setDate(actual.getDate() + 1);
  }

  return fechas;
}

// 🔥 CARGAR DATOS EN TIEMPO REAL
function cargarDatos() {
  const ref = doc(db, "torneo", "datos");

  onSnapshot(ref, (docSnap) => {
    if (docSnap.exists()) {
      datos = docSnap.data().partidos;
    } else {
      datos = generarFechas().map(f => ({
        fecha: f.toLocaleDateString('es-AR', {
          day: '2-digit',
          month: '2-digit'
        }),
        resultado: null
      }));

      guardar();
    }

    renderPartidos();
    renderTabla();
  });
}

// 🔥 GUARDAR
function guardar() {
  const ref = doc(db, "torneo", "datos");
  setDoc(ref, { partidos: datos });
}

// PARTIDOS
function renderPartidos() {
  const tabla = document.getElementById("partidos");

  tabla.innerHTML = `
    <tr>
      <th>Fecha</th>
      <th>Resultado</th>
      <th>Cargar</th>
    </tr>
  `;

  datos.forEach((partido, i) => {
    let fila = document.createElement("tr");

    fila.innerHTML = `
      <td>${partido.fecha}</td>
      <td class="${
        partido.resultado === "Empate"
          ? "empate"
          : partido.resultado?.includes(equipoA) || partido.resultado?.includes(equipoB)
          ? "ganado"
          : ""
      }">
        ${partido.resultado ?? "-"}
      </td>
      <td>
        ${admin ? `
          <input type="number" placeholder="+goles" id="goles${i}">
          <select id="ganador${i}">
            <option value="">-</option>
            <option value="A">${equipoA}</option>
            <option value="B">${equipoB}</option>
            <option value="E">Empate</option>
          </select>
          <button onclick="guardarResultado(${i})">OK</button>
        ` : 'Solo lectura'}
      </td>
    `;

    tabla.appendChild(fila);
  });
}

// GUARDAR RESULTADO
window.guardarResultado = function(i) {
  let goles = document.getElementById("goles" + i).value;
  let ganador = document.getElementById("ganador" + i).value;

  if (!ganador) return alert("Elegí un resultado");
  if (ganador !== "E" && (!goles || goles <= 0)) {
    return alert("Ingresá la diferencia de goles");
  }

  if (ganador === "E") {
    datos[i].resultado = "Empate";
  } else {
    datos[i].resultado = `${ganador === "A" ? equipoA : equipoB} +${goles}`;
  }

  guardar();
}

// TABLA
function renderTabla() {
  let puntosA = 0;
  let puntosB = 0;

  datos.forEach(p => {
    if (!p.resultado) return;

    if (p.resultado === "Empate") {
      puntosA += 1;
      puntosB += 1;
    } else if (p.resultado.includes(equipoA)) {
      puntosA += 3;
    } else {
      puntosB += 3;
    }
  });

  let jugados = datos.filter(p => p.resultado).length;

  let tabla = [
    { nombre: equipoA, puntos: puntosA },
    { nombre: equipoB, puntos: puntosB }
  ].sort((a, b) => b.puntos - a.puntos);

  document.getElementById("tabla").innerHTML = `
    <div style="margin-bottom:10px; color:#9ca3af;">
      Partidos jugados: ${jugados}
    </div>
    ${tabla.map((e, i) => `
      <div class="fila ${i === 0 ? 'lider' : ''}">
        ${i === 0 ? '🥇' : ''} <b>${e.nombre}</b> -
        ${e.puntos} pts
      </div>
    `).join("")}
  `;
}

// INIT
cargarDatos();

</script>

</body>
</html>
