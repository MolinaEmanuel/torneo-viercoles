<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo Viércoles</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">⚽ Torneo Viércoles</div>

<h1>Torneo Apertura 2026</h1>
<h2>Julio "Messi" Gimenez</h2>

<!-- NAVBAR -->
<div class="topbar">
  <div class="nav-left">
    <button onclick="mostrarSeccion('inicio')">Inicio</button>
    <button onclick="mostrarSeccion('historial')">Historial</button>
    <button onclick="mostrarSeccion('ranking')">Ranking MVP</button>
  </div>

  <div class="nav-right">
    <button onclick="abrirLogin()">Modo admin</button>
    <button onclick="logout()">Salir admin</button>
  </div>
</div>

<!-- LOGIN -->
<div id="modalLogin" class="modal">
  <div class="modal-content">
    <h3>Ingreso admin</h3>
    <input type="password" id="passwordInput">
    <button onclick="verificarLogin()">Ingresar</button>
  </div>
</div>

<!-- INICIO -->
<div id="inicio">

<div class="cards-top">
  <div class="card highlight">
    <h3>📅 Fecha actual</h3>
    <div id="fechaActual"></div>
  </div>

  <div class="card highlight">
    <h3>🏅 Jugador de la fecha</h3>
    <div id="jugadorTexto"></div>

    <div id="adminJugador" style="display:none;">
      <input type="text" id="inputJugador">
      <button onclick="guardarJugador()">Guardar</button>
    </div>
  </div>
</div>

<div class="card">
  <h2>Tabla de posiciones</h2>
  <div id="tabla"></div>
</div>

<div class="card">
  <h2>Partidos</h2>
  <table id="partidos"></table>
</div>

</div>

<!-- HISTORIAL -->
<div id="historial" style="display:none;">
  <div class="card">
    <h2>📜 Historial</h2>
    <div id="historialContenido"></div>
  </div>
</div>

<!-- RANKING -->
<div id="ranking" style="display:none;">
  <div class="card">
    <h2>🏅 Ranking MVP</h2>
    <div id="rankingContenido"></div>
  </div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
