<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo Viércoles</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">⚽ Torneo Viércoles</div>

<h1>Torneo Apertura 2026</h1>
<h2>Julio "Messi" Gimenez</h2>

<!-- NAV -->
<div style="display:flex; gap:10px; justify-content:center; margin-bottom:20px;">
  <button onclick="mostrarSeccion('inicio')">Inicio</button>
  <button onclick="mostrarSeccion('historial')">Historial</button>
  <button onclick="mostrarSeccion('ranking')">Ranking MVP</button>
</div>

<button onclick="abrirLogin()">Modo admin</button>
<button onclick="logout()">Salir admin</button>

<!-- LOGIN -->
<div id="modalLogin" class="modal">
  <div class="modal-content">
    <h3>Ingreso admin</h3>
    <input type="password" id="passwordInput">
    <button onclick="verificarLogin()">Ingresar</button>
  </div>
</div>

<!-- INICIO -->
<div id="inicio">

<div class="card" style="display:flex; gap:20px; flex-wrap:wrap;">
  <div class="card">
    <h3>📅 Fecha actual</h3>
    <div id="fechaActual"></div>
  </div>

  <div class="card">
    <h3>🏅 Jugador de la fecha</h3>
    <div id="jugadorTexto"></div>

    <div id="adminJugador" style="display:none;">
      <input type="text" id="inputJugador">
      <button onclick="guardarJugador()">Guardar</button>
    </div>
  </div>
</div>

<div class="card">
  <h2>Tabla de posiciones</h2>
  <div id="tabla"></div>
</div>

<div class="card">
  <h2>Partidos</h2>
  <table id="partidos"></table>
</div>

</div>

<!-- HISTORIAL -->
<div id="historial" style="display:none;">
  <div class="card">
    <h2>📜 Historial</h2>
    <div id="historialContenido"></div>
  </div>
</div>

<!-- RANKING -->
<div id="ranking" style="display:none;">
  <div class="card">
    <h2>🏅 Ranking MVP</h2>
    <div id="rankingContenido"></div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAY-F10jVa_KTRtIjm4GNupFQ_UR1TsJVw",
  authDomain: "torneo-viercoles.firebaseapp.com",
  projectId: "torneo-viercoles",
  storageBucket: "torneo-viercoles.firebasestorage.app",
  messagingSenderId: "233402812946",
  appId: "1:233402812946:web:f1b9acd1f95f243200e6cb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const equipoA = "Equipo SEBA";
const equipoB = "Equipo HEBER";

let admin = localStorage.getItem("admin") === "true";
let datos = [];
let jugadores = [];

// NAV
window.mostrarSeccion = (sec) => {
  ["inicio","historial","ranking"].forEach(s=>{
    document.getElementById(s).style.display = s===sec ? "block":"none";
  });
};

// LOGIN
window.abrirLogin = () => modalLogin.style.display="flex";
window.verificarLogin = () => {
  if(passwordInput.value==="cogi2"){
    admin=true;
    localStorage.setItem("admin","true");
    modalLogin.style.display="none";
    renderAll();
  } else alert("Error");
};
window.logout = () => {
  admin=false;
  localStorage.removeItem("admin");
  renderAll();
};

// FECHAS
function generarFechas(){
  let fechas=[];
  let actual=new Date("2026-04-01");
  while(fechas.length<18){
    if(actual.getDay()===3) fechas.push(new Date(actual));
    actual.setDate(actual.getDate()+1);
  }
  return fechas;
}

// FIREBASE
function cargarDatos(){
  const ref=doc(db,"torneo","datos");

  onSnapshot(ref,(docSnap)=>{
    if(docSnap.exists()){
      datos=docSnap.data().partidos;
      jugadores=docSnap.data().jugadores||[];
    } else {
      datos=generarFechas().map(f=>({
        fecha:f.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}),
        golesA:null,
        golesB:null
      }));
      jugadores=new Array(18).fill("");
      guardar();
    }
    renderAll();
  });
}

function guardar(){
  setDoc(doc(db,"torneo","datos"),{
    partidos:datos,
    jugadores:jugadores
  });
}

// RESULTADOS
window.guardarResultado=(i)=>{
  let a=parseInt(document.getElementById("a"+i).value);
  let b=parseInt(document.getElementById("b"+i).value);
  if(isNaN(a)||isNaN(b)) return alert("Error");

  datos[i].golesA=a;
  datos[i].golesB=b;
  guardar();
};

// JUGADOR
window.guardarJugador=()=>{
  let idx=datos.filter(p=>p.golesA!=null).length-1;
  if(idx<0) return;
  jugadores[idx]=inputJugador.value;
  guardar();
};

// RENDER
function renderAll(){
  renderPartidos();
  renderTabla();
  renderInfo();
  renderHistorial();
  renderRanking();
}

// PARTIDOS
function renderPartidos(){
  let html=`<tr>
  <th>Fecha</th><th>Día</th><th>Resultado</th><th>Cargar</th></tr>`;

  datos.forEach((p,i)=>{
    let res="-";
    if(p.golesA!=null){
      res=`${p.golesA}-${p.golesB}`;
    }

    html+=`<tr>
    <td>Fecha ${i+1}</td>
    <td>${p.fecha}</td>
    <td>${res}</td>
    <td>${admin?`
      <input id="a${i}" type="number">
      <input id="b${i}" type="number">
      <button onclick="guardarResultado(${i})">OK</button>
    `:'-'}</td>
    </tr>`;
  });

  partidos.innerHTML=html;
}

// TABLA
function renderTabla(){
  let a=0,b=0;

  datos.forEach(p=>{
    if(p.golesA==null) return;
    if(p.golesA>p.golesB) a+=3;
    else if(p.golesB>p.golesA) b+=3;
    else {a++;b++;}
  });

  tabla.innerHTML=`
  <div>${equipoA}: ${a} pts</div>
  <div>${equipoB}: ${b} pts</div>`;
}

// INFO
function renderInfo(){
  let jugados=datos.filter(p=>p.golesA!=null).length;
  fechaActual.innerText="Fecha "+jugados;
  jugadorTexto.innerHTML="<b>"+(jugadores[jugados-1]||"-")+"</b>";
  adminJugador.style.display=admin?"block":"none";
}

// HISTORIAL
function renderHistorial(){
  let html="";
  datos.forEach((p,i)=>{
    if(p.golesA==null) return;

    html+=`
    <div class="fila">
      Fecha ${i+1} (${p.fecha})<br>
      Resultado: ${p.golesA}-${p.golesB}<br>
      MVP: ${jugadores[i]||"-"}
    </div>`;
  });
  historialContenido.innerHTML=html;
}

// RANKING
function renderRanking(){
  let count={};
  jugadores.forEach(j=>{
    if(!j) return;
    count[j]=(count[j]||0)+1;
  });

  let arr=Object.entries(count).sort((a,b)=>b[1]-a[1]);

  rankingContenido.innerHTML=arr.map(([n,c])=>`
    <div class="fila">${n} - ${c}</div>
  `).join("");
}

// INIT
cargarDatos();

</script>

</body>
</html>
