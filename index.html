<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Torneo Apertura 2026 - Fútbol Miércoles">
  <title>Futbol Viércoles</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="assets/images/logo/isologo FV.png" type="image/png">
</head>

<body>

  <!-- LOADER -->
  <div id="loader" class="loader" aria-label="Cargando...">
    <div class="spinner"></div>
  </div>

  <!-- VIDEO BANNER -->
  <div class="video-banner" aria-hidden="true">
    <video autoplay muted loop playsinline preload="none">
      <source src="assets/video/video web.mp4" type="video/mp4">
    </video>
  </div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <img src="assets/images/logo/logo futbol viercoles.png" alt="Logo Fútbol Viércoles" class="logo-principal">
    </div>
    <div class="header-center">
      <h1>Torneo Apertura 2026</h1>
      <h2>Julio "Messi" Gimenez</h2>
    </div>
    <div class="header-right">
      <img src="assets/images/logo/logo conmebol.png" alt="Logo CONMEBOL" class="logo-secundario">
    </div>
  </header>

  <!-- NAVBAR -->
  <nav class="topbar" role="navigation" aria-label="Menú principal">
    <button onclick="mostrarSeccion('inicio')"    class="nav-btn active-nav" data-section="inicio">Inicio</button>
    <button onclick="mostrarSeccion('plantel')"   class="nav-btn" data-section="plantel">Plantel</button>
    <button onclick="mostrarSeccion('historial')" class="nav-btn" data-section="historial">Historial</button>
    <button onclick="mostrarSeccion('ranking')"   class="nav-btn" data-section="ranking">Ranking MVP</button>
    <button onclick="mostrarSeccion('cumples')"   class="nav-btn" data-section="cumples">Cumpleaños</button>
    <button onclick="mostrarSeccion('palmares')" class="nav-btn" data-section="palmares">Palmarés</button>
    <button onclick="abrirLogin()"  class="nav-btn btn-admin"  id="btnAdminLogin" title="Modo Admin">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </button>
    <button onclick="logout()" class="nav-btn btn-logout" id="btnAdminLogout" style="display:none" title="Salir Admin">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
    </button>
    <!--<button onclick="toggleTema()" class="nav-btn btn-tema" id="btnTema" title="Cambiar tema">
      <svg id="iconTema" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>-->
  </nav>

  <!-- LOGIN MODAL -->
  <div id="modalLogin" class="modal" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
    <div class="modal-content">
      <h3 id="loginTitle">Ingreso Admin</h3>
      <input type="password" id="passwordInput" placeholder="Contraseña" autocomplete="current-password">
      <div class="modal-actions">
        <button onclick="verificarLogin()">Ingresar</button>
        <button class="btn-secondary" onclick="document.getElementById('modalLogin').style.display='none'">Cancelar</button>
      </div>
    </div>
  </div>

  <main>

    <!-- SECCIÓN: INICIO -->
    <section id="inicio" class="seccion activa">
      <div class="cards-top">
        <div class="card highlight">
          <h3>Fecha actual</h3>
          <div id="fechaActual" class="stat-value">-</div>
        </div>
        <div class="card highlight">
          <h3>Jugador de la fecha</h3>
          <div id="jugadorTexto" class="stat-value">-</div>
          <div id="adminJugador" style="display:none;" class="admin-inline">
            <input type="text" id="inputJugador" placeholder="Nombre del MVP">
            <button onclick="guardarJugador()">Guardar</button>
          </div>
        </div>
      </div>
      <div class="card">
        <h2>Tabla de posiciones</h2>
        <div id="tabla"></div>
      </div>
      <div class="card">
        <h2>Partidos</h2>
        <div class="table-wrapper">
          <table id="partidos"></table>
        </div>
      </div>
    </section>

    <!-- SECCIÓN: PLANTEL -->
    <section id="plantel" class="seccion">
      <div class="card">
        <h2>Planteles</h2>
        <div class="equipo">
          <div class="equipo-titulo equipo-titulo-a" onclick="toggleEquipo('A')" role="button" tabindex="0" aria-expanded="false" id="titleA">
            <span>Equipo SEBA</span>
            <span class="chevron">▾</span>
          </div>
          <div class="equipo-admin" id="adminA" style="display:none;">
            <button onclick="agregarJugador('A')" id="btnA">+ Agregar jugador</button>
            <button onclick="setFotoEquipo('A')"  id="fotoA">📷 Foto equipo</button>
          </div>
          <img id="imgEquipoA" class="foto-equipo" style="display:none;" alt="Foto Equipo A">
          <div id="listaA" class="equipo-lista"></div>
        </div>
        <div class="equipo">
          <div class="equipo-titulo equipo-titulo-b" onclick="toggleEquipo('B')" role="button" tabindex="0" aria-expanded="false" id="titleB">
            <span>Equipo HEBER</span>
            <span class="chevron">▾</span>
          </div>
          <div class="equipo-admin" id="adminB" style="display:none;">
            <button onclick="agregarJugador('B')" id="btnB">+ Agregar jugador</button>
            <button onclick="setFotoEquipo('B')"  id="fotoB">📷 Foto equipo</button>
          </div>
          <img id="imgEquipoB" class="foto-equipo" style="display:none;" alt="Foto Equipo B">
          <div id="listaB" class="equipo-lista"></div>
        </div>
      </div>
    </section>

    <!-- SECCIÓN: HISTORIAL -->
    <section id="historial" class="seccion">
      <div class="card">
        <h2>Historial</h2>
        <div id="historialContenido"></div>
      </div>
    </section>

    <!-- SECCIÓN: RANKING -->
    <section id="ranking" class="seccion">
      <div class="card">
        <h2>Ranking MVP</h2>
        <div id="rankingContenido"></div>
      </div>
    </section>

    <!-- SECCIÓN: CUMPLEAÑOS -->
    <section id="cumples" class="seccion">
      <div class="card">
        <h2>Cumpleaños</h2>
        <div id="cumpleContenido"></div>
      </div>
    </section>

    <!-- SECCIÓN: PALMARÉS -->
    <section id="palmares" class="seccion">
      <div id="palmaresContenido"></div>
    </section>

  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
